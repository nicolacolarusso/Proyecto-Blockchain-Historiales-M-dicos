version: 1.2.0
port: 8054
debug: false

tls:
  enabled: true
  certfile:
  keyfile:
  clientauth:
    type: noclientcert
    certfiles:

ca:
  name: ca-minsalud

crl:
  expiry: 24h

registry:
  maxenrollments: -1
  identities:
    - name: admin
      pass: adminpw
      type: client
      affiliation: ""
      attrs:
        hf.Registrar.Roles: "*"
        hf.Registrar.DelegateRoles: "*"
        hf.Revoker: true
        hf.IntermediateCA: true
        hf.GenCRL: true
        hf.Registrar.Attributes: "*"
        hf.AffiliationMgr: true

affiliations:
  minsalud:
    - regulacion
    - auditoria
    - sistemas

signing:
  default:
    usage:
      - digital signature
    expiry: 8760h
  profiles:
    ca:
      usage:
        - cert sign
        - crl sign
      expiry: 43800h
      caconstraint:
        isca: true
        maxpathlen: 0
    tls:
      usage:
        - signing
        - key encipherment
        - server auth
        - client auth
        - key agreement
      expiry: 8760h

csr:
  cn: ca.minsalud.salud.com
  keyrequest:
    algo: ecdsa
    size: 256
  names:
    - C: VE
      ST: Distrito Capital
      L: Caracas
      O: MinisterioSalud
      OU: Fabric
  hosts:
    - localhost
    - ca.minsalud.salud.com
  ca:
    expiry: 131400h
    pathlength: 1
